<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agendar com Joao - teste</title>
<style>
  :root {
    --bg: #f6f3ee;
    --panel: #fffdfa;
    --ink: #221f1b;
    --muted: #6f685f;
    --line: #ded5c9;
    --accent: #8b6b36;
    --accent-2: #255f85;
    --ok: #2f7a4f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    line-height: 1.4;
  }
  .wrap {
    width: min(980px, 100%);
    margin: 0 auto;
    padding: 18px;
  }
  header {
    padding: 20px 0 14px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 18px;
  }
  .eyebrow {
    color: var(--accent);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: .18em;
    text-transform: uppercase;
  }
  h1 {
    margin: 6px 0 4px;
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(30px, 7vw, 48px);
    font-weight: 600;
  }
  .sub {
    margin: 0;
    color: var(--muted);
    font-size: 15px;
  }
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) 330px;
    gap: 18px;
    align-items: start;
  }
  .section {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px;
  }
  .section h2 {
    margin: 0 0 12px;
    font-size: 17px;
    font-weight: 700;
  }
  .days {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .day {
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink);
    border-radius: 7px;
    padding: 10px 8px;
    text-align: left;
    cursor: pointer;
    min-height: 72px;
  }
  .day strong {
    display: block;
    font-size: 19px;
    font-family: Georgia, "Times New Roman", serif;
  }
  .day span {
    display: block;
    color: var(--muted);
    font-size: 12px;
  }
  .day.active {
    border-color: var(--accent-2);
    box-shadow: 0 0 0 2px rgba(37, 95, 133, .15);
  }
  .slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .slot {
    min-height: 44px;
    border: 1px solid var(--accent-2);
    background: #fff;
    color: var(--accent-2);
    border-radius: 7px;
    font-weight: 700;
    cursor: pointer;
  }
  .slot.active {
    background: var(--accent-2);
    color: #fff;
  }
  .slot[disabled] {
    border-color: var(--line);
    color: #9b9388;
    background: #f1eee9;
    cursor: not-allowed;
    text-decoration: line-through;
  }
  .form {
    display: grid;
    gap: 10px;
  }
  label {
    display: grid;
    gap: 5px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 650;
  }
  input, textarea {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 7px;
    min-height: 44px;
    padding: 10px 11px;
    font: inherit;
    color: var(--ink);
  }
  textarea {
    min-height: 86px;
    resize: vertical;
  }
  .summary {
    display: grid;
    gap: 10px;
    color: var(--muted);
    font-size: 14px;
  }
  .summary strong {
    color: var(--ink);
  }
  .pill {
    display: inline-flex;
    align-items: center;
    width: fit-content;
    min-height: 30px;
    border-radius: 999px;
    border: 1px solid var(--line);
    padding: 5px 10px;
    color: var(--muted);
    background: #fff;
    font-size: 12px;
    font-weight: 700;
  }
  .book {
    width: 100%;
    min-height: 46px;
    border: 0;
    border-radius: 7px;
    background: var(--accent);
    color: #fff;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
  }
  .book:disabled {
    opacity: .45;
    cursor: not-allowed;
  }
  .notice {
    margin-top: 12px;
    color: var(--ok);
    font-weight: 750;
    display: none;
  }
  .small {
    margin-top: 12px;
    color: var(--muted);
    font-size: 12px;
  }
  @media (max-width: 760px) {
    .wrap { padding: 14px; }
    .layout { grid-template-columns: 1fr; }
    .days { grid-template-columns: repeat(2, 1fr); }
    .slots { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<main class="wrap">
  <header>
    <div class="eyebrow">Teste de agendamento</div>
    <h1>Agendar com Joao</h1>
    <p class="sub">Reunioes de 1 hora, nos horarios liberados.</p>
  </header>

  <div class="layout">
    <section class="section">
      <h2>Escolha um horario</h2>
      <div class="days" id="days"></div>
      <div class="slots" id="slots"></div>
      <p class="small">Preview visual. A versao real sera o link do Google Calendar.</p>
    </section>

    <aside class="section">
      <h2>Confirmacao</h2>
      <div class="summary">
        <span class="pill">Duracao: 1 hora</span>
        <p><strong>Data:</strong> <span id="pickedDate">selecione</span></p>
        <p><strong>Horario:</strong> <span id="pickedTime">selecione</span></p>
      </div>
      <div class="form">
        <label>Nome
          <input placeholder="Seu nome">
        </label>
        <label>E-mail
          <input placeholder="voce@email.com" inputmode="email">
        </label>
        <label>Assunto
          <textarea placeholder="Opcional"></textarea>
        </label>
        <button class="book" id="book" disabled>Reservar horario</button>
      </div>
      <div class="notice" id="notice">Teste confirmado visualmente.</div>
    </aside>
  </div>
</main>

<script>
  const days = [
    ["Seg", "15 jun"],
    ["Ter", "16 jun"],
    ["Qua", "17 jun"],
    ["Qui", "18 jun"],
    ["Sex", "19 jun"]
  ];
  const slots = ["09:00", "10:00", "13:00", "14:00", "15:00"];
  const blocked = {
    "16 jun": ["10:00"],
    "18 jun": ["13:00", "15:00"]
  };
  let selectedDay = days[0][1];
  let selectedSlot = "";

  const daysEl = document.querySelector("#days");
  const slotsEl = document.querySelector("#slots");
  const pickedDate = document.querySelector("#pickedDate");
  const pickedTime = document.querySelector("#pickedTime");
  const book = document.querySelector("#book");
  const notice = document.querySelector("#notice");

  function renderDays() {
    daysEl.innerHTML = "";
    days.forEach(([weekday, date]) => {
      const button = document.createElement("button");
      button.className = `day${date === selectedDay ? " active" : ""}`;
      button.innerHTML = `<span>${weekday}</span><strong>${date}</strong><span>Disponivel</span>`;
      button.addEventListener("click", () => {
        selectedDay = date;
        selectedSlot = "";
        notice.style.display = "none";
        render();
      });
      daysEl.appendChild(button);
    });
  }

  function renderSlots() {
    slotsEl.innerHTML = "";
    slots.forEach((time) => {
      const button = document.createElement("button");
      const isBlocked = (blocked[selectedDay] || []).includes(time);
      button.className = `slot${time === selectedSlot ? " active" : ""}`;
      button.textContent = time;
      button.disabled = isBlocked;
      button.addEventListener("click", () => {
        selectedSlot = time;
        notice.style.display = "none";
        render();
      });
      slotsEl.appendChild(button);
    });
  }

  function renderSummary() {
    pickedDate.textContent = selectedDay;
    pickedTime.textContent = selectedSlot || "selecione";
    book.disabled = !selectedSlot;
  }

  function render() {
    renderDays();
    renderSlots();
    renderSummary();
  }

  book.addEventListener("click", () => {
    notice.style.display = "block";
  });

  render();
</script>
</body>
</html>
