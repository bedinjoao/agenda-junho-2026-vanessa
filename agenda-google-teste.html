<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agenda Google - teste de interface</title>
<style>
  :root {
    --bg: #f4efe6;
    --panel: #fbf8f1;
    --ink: #23201b;
    --muted: #6b6356;
    --line: #d9d0bf;
    --brass: #9a7b3f;
    --joao: #b4452f;
    --vanessa: #a8527d;
    --livre: #2f7a4f;
    --blue: #2d6687;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    line-height: 1.42;
  }
  .wrap {
    width: min(1120px, 100%);
    margin: 0 auto;
    padding: 18px 14px 56px;
  }
  header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    gap: 16px;
    padding: 12px 0 16px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 16px;
  }
  .eyebrow {
    color: var(--brass);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: .18em;
    text-transform: uppercase;
  }
  h1 {
    margin: 4px 0 0;
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(30px, 6vw, 46px);
    font-weight: 600;
  }
  .status {
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--panel);
    color: var(--muted);
    min-height: 36px;
    padding: 7px 12px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .status::before {
    content: "";
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--joao);
    box-shadow: 0 0 0 3px rgba(180, 69, 47, .14);
    flex: 0 0 auto;
  }
  .tabs {
    display: inline-grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 4px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    margin-bottom: 14px;
  }
  .tab {
    border: 0;
    border-radius: 6px;
    min-height: 38px;
    padding: 0 14px;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-weight: 750;
    cursor: pointer;
  }
  .tab.active {
    background: var(--brass);
    color: #fff;
  }
  .view { display: none; }
  .view.active { display: block; }
  .grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  .day {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    min-height: 360px;
    padding: 10px;
  }
  .day h2 {
    margin: 0 0 10px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 14px;
  }
  .day h2 strong {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 24px;
  }
  .items {
    display: grid;
    gap: 7px;
  }
  .item {
    border-left: 4px solid var(--line);
    background: #fff;
    border-radius: 0 7px 7px 0;
    padding: 8px;
    min-height: 56px;
    font-size: 13px;
  }
  .item .time {
    display: block;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
    margin-bottom: 2px;
  }
  .item.joao { border-color: var(--joao); }
  .item.vanessa { border-color: var(--vanessa); }
  .item.livre { border-color: var(--livre); }
  .booking {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 340px;
    gap: 14px;
    align-items: start;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px;
  }
  .slots {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }
  .slotday {
    display: grid;
    gap: 7px;
  }
  .slotday h2 {
    margin: 0 0 2px;
    font-size: 14px;
  }
  .slot {
    min-height: 42px;
    border: 1px solid var(--blue);
    border-radius: 7px;
    background: #fff;
    color: var(--blue);
    font: inherit;
    font-weight: 800;
    cursor: pointer;
  }
  .slot.active {
    background: var(--blue);
    color: #fff;
  }
  .slot[disabled] {
    border-color: var(--line);
    color: #9f978d;
    background: #eee9df;
    cursor: not-allowed;
    text-decoration: line-through;
  }
  label {
    display: grid;
    gap: 5px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
    margin-top: 10px;
  }
  input, textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: #fff;
    color: var(--ink);
    min-height: 44px;
    padding: 10px 11px;
    font: inherit;
  }
  textarea { min-height: 92px; resize: vertical; }
  .summary {
    display: grid;
    gap: 7px;
    margin: 10px 0 12px;
    color: var(--muted);
    font-size: 14px;
  }
  .summary strong { color: var(--ink); }
  .book {
    width: 100%;
    min-height: 46px;
    border: 0;
    border-radius: 7px;
    background: var(--brass);
    color: #fff;
    font: inherit;
    font-weight: 850;
    cursor: pointer;
  }
  .book:disabled { opacity: .45; cursor: not-allowed; }
  .note {
    color: var(--muted);
    font-size: 12px;
    margin-top: 10px;
  }
  .ok {
    display: none;
    color: var(--livre);
    font-weight: 800;
    margin-top: 10px;
  }
  @media (max-width: 820px) {
    header { align-items: start; flex-direction: column; }
    .grid, .slots { grid-template-columns: 1fr; }
    .day { min-height: auto; }
    .booking { grid-template-columns: 1fr; }
    .tabs { width: 100%; }
  }
</style>
</head>
<body>
<main class="wrap">
  <header>
    <div>
      <div class="eyebrow">Teste sem afetar agenda atual</div>
      <h1>Agenda simples</h1>
    </div>
    <div class="status">Google Calendar por tras: simulado</div>
  </header>

  <nav class="tabs" aria-label="Vistas">
    <button class="tab active" data-view="agenda">Agenda</button>
    <button class="tab" data-view="booking">Agendamento</button>
  </nav>

  <section class="view active" id="agenda">
    <div class="grid" id="week"></div>
  </section>

  <section class="view" id="booking">
    <div class="booking">
      <div class="panel">
        <h2>Horarios liberados</h2>
        <div class="slots" id="slots"></div>
        <p class="note">Na versao real, os bloqueios viriam do Google Calendar do Joao e da Vanessa.</p>
      </div>
      <aside class="panel">
        <h2>Reserva</h2>
        <div class="summary">
          <span><strong>Duracao:</strong> 1 hora</span>
          <span><strong>Quando:</strong> <span id="picked">selecione um horario</span></span>
        </div>
        <label>Nome
          <input placeholder="Nome">
        </label>
        <label>E-mail
          <input placeholder="email@exemplo.com" inputmode="email">
        </label>
        <label>Assunto
          <textarea placeholder="Opcional"></textarea>
        </label>
        <button class="book" id="book" disabled>Agendar teste</button>
        <div class="ok" id="ok">Teste visual reservado.</div>
      </aside>
    </div>
  </section>
</main>

<script>
  const days = ["Seg 15", "Ter 16", "Qua 17", "Qui 18", "Sex 19"];
  const events = {
    "Seg 15": [
      ["09:00", "livre", "Horario liberado"],
      ["13:00", "joao", "Reuniao do Joao"],
      ["15:00", "livre", "Horario liberado"]
    ],
    "Ter 16": [
      ["09:00", "livre", "Horario liberado"],
      ["10:00", "vanessa", "Bloqueio Vanessa"],
      ["14:00", "livre", "Horario liberado"]
    ],
    "Qua 17": [
      ["09:00", "joao", "Compromisso"],
      ["13:00", "livre", "Horario liberado"],
      ["15:00", "livre", "Horario liberado"]
    ],
    "Qui 18": [
      ["10:00", "livre", "Horario liberado"],
      ["13:00", "vanessa", "Bloqueio Vanessa"],
      ["15:00", "joao", "Reuniao"]
    ],
    "Sex 19": [
      ["09:00", "livre", "Horario liberado"],
      ["10:00", "livre", "Horario liberado"],
      ["14:00", "livre", "Horario liberado"]
    ]
  };
  const allSlots = ["09:00", "10:00", "13:00", "14:00", "15:00"];
  let selected = "";

  function renderAgenda() {
    const week = document.querySelector("#week");
    week.innerHTML = "";
    days.forEach((day) => {
      const card = document.createElement("article");
      card.className = "day";
      card.innerHTML = `<h2><span>${day.split(" ")[0]}</span><strong>${day.split(" ")[1]}</strong></h2>`;
      const list = document.createElement("div");
      list.className = "items";
      events[day].forEach(([time, type, title]) => {
        const item = document.createElement("div");
        item.className = `item ${type}`;
        item.innerHTML = `<span class="time">${time}</span>${title}`;
        list.appendChild(item);
      });
      card.appendChild(list);
      week.appendChild(card);
    });
  }

  function isBlocked(day, time) {
    return events[day].some(([eventTime, type]) => eventTime === time && type !== "livre");
  }

  function renderSlots() {
    const slots = document.querySelector("#slots");
    slots.innerHTML = "";
    days.forEach((day) => {
      const group = document.createElement("div");
      group.className = "slotday";
      group.innerHTML = `<h2>${day}</h2>`;
      allSlots.forEach((time) => {
        const key = `${day} ${time}`;
        const button = document.createElement("button");
        button.className = `slot${selected === key ? " active" : ""}`;
        button.textContent = time;
        button.disabled = isBlocked(day, time);
        button.addEventListener("click", () => {
          selected = key;
          document.querySelector("#picked").textContent = key;
          document.querySelector("#book").disabled = false;
          document.querySelector("#ok").style.display = "none";
          renderSlots();
        });
        group.appendChild(button);
      });
      slots.appendChild(group);
    });
  }

  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((btn) => btn.classList.remove("active"));
      document.querySelectorAll(".view").forEach((view) => view.classList.remove("active"));
      tab.classList.add("active");
      document.querySelector(`#${tab.dataset.view}`).classList.add("active");
    });
  });

  document.querySelector("#book").addEventListener("click", () => {
    document.querySelector("#ok").style.display = "block";
  });

  renderAgenda();
  renderSlots();
</script>
</body>
</html>
