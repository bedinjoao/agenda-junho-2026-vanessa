<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Agenda privada</title>
<style>
  :root{
    color-scheme:light;
    --paper:#f4efe6;
    --card:#fbf8f1;
    --ink:#23201b;
    --muted:#6b6356;
    --line:#d9d0bf;
    --brass:#9a7b3f;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    background:var(--paper);
    color:var(--ink);
    padding:24px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  main{
    width:min(560px,100%);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px;
    box-shadow:0 18px 48px rgba(35,32,27,.12);
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--brass);
    font-weight:800;
    margin-bottom:10px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:600;
    margin:0 0 10px;
    font-size:30px;
  }
  p{
    line-height:1.55;
    color:var(--muted);
    margin:0 0 10px;
  }
  .stamp{
    font-size:12px;
    color:#8a8174;
    margin-top:20px;
  }
</style>
</head>
<body>
<main>
  <div class="eyebrow">Familia Bedin</div>
  <h1>Agenda privada</h1>
  <p>Esta agenda saiu do link publico.</p>
  <p>O acesso sera migrado para uma rota privada autorizada para Joao e Vanessa.</p>
  <div class="stamp">Atualizado em 2026-06-07.</div>
</main>
</body>
</html>
